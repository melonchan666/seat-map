
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>氓路楼盲陆聹氓庐陇 脗路 氓聭聵氓路楼氓路楼盲陆聧氓聸戮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1a1c22;
  --surface: #22262e;
  --surface-hover: #2a2f38;
  --border: #323640;
  --text: #e4e6ea;
  --text-dim: #8b8f98;
  --text-muted: #5a5e66;
  --blue: #4a8cf7;
  --blue-bg: rgba(74,140,247,0.12);
  --green: #34c759;
  --green-bg: rgba(52,199,89,0.12);
  --red: #ff4757;
  --red-bg: rgba(255,71,87,0.12);
  --orange: #ff9f43;
  --orange-bg: rgba(255,159,67,0.12);
  --purple: #a55eea;
  --purple-bg: rgba(165,94,234,0.12);
  --cyan: #2ed8a3;
  --cyan-bg: rgba(46,216,163,0.12);
  --wall: #2d3139;
  --floor: #1e2128;
  --corridor: #1a1c22;
  --door: #4a8cf7;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* ===== 茅隆露茅聝篓忙聽聫 ===== */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.topbar .badge {
  font-size: 11px; padding: 3px 10px; border-radius: 10px;
  background: var(--green-bg); color: var(--green); font-weight: 600;
}
.topbar .time { font-size: 12px; color: var(--text-dim); }

.stats-row {
  display: flex; gap: 6px;
}
.stat-pill {
  padding: 5px 14px; border-radius: 16px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
}
.stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-pill .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
.stat-pill .dot.off { background: var(--red); }
.stat-pill .dot.leave { background: var(--orange); }
.stat-pill .dot.remote { background: var(--purple); }

/* ===== 氓路楼氓聟路忙聽聫 ===== */
.toolbar {
  padding: 12px 24px;
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.toolbar .dept-filter {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.dept-chip {
  padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim); white-space: nowrap;
}
.dept-chip:hover { color: var(--text); border-color: var(--text-dim); }
.dept-chip.active { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
.dept-chip.all { font-weight: 600; }

.search-box {
  position: relative; margin-left: auto;
}
.search-box input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 7px 14px 7px 32px; font-size: 13px; color: var(--text); width: 200px;
  outline: none; transition: all 0.2s;
}
.search-box input:focus { border-color: var(--blue); width: 240px; }
.search-box input::placeholder { color: var(--text-muted); }
.search-box .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none;
}

/* ===== 盲赂禄莽聰禄氓赂聝 ===== */
.main-canvas {
  padding: 20px 24px 40px;
  display: flex; justify-content: center;
}

.office-plan {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  position: relative;
  min-width: 1100px;
  max-width: 1400px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}

/* 氓垄聶氓拢聛 */
.wall-north, .wall-south, .wall-west, .wall-east {
  position: absolute; background: var(--wall);
}
.wall-north { top: 0; left: 0; right: 0; height: 8px; border-radius: 20px 20px 0 0; }
.wall-south { bottom: 0; left: 0; right: 0; height: 8px; border-radius: 0 0 20px 20px; }
.wall-west  { top: 0; left: 0; bottom: 0; width: 8px; border-radius: 20px 0 0 20px; }
.wall-east  { top: 0; right: 0; bottom: 0; width: 8px; border-radius: 0 20px 20px 0; }

/* 氓聟楼氓聫拢茅聴篓 */
.door-entry {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 6px; background: var(--door);
  border-radius: 3px 3px 0 0; z-index: 2;
}
.door-entry::after {
  content: '氓聟楼氓聫拢'; position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--text-muted); white-space: nowrap;
}

/* 莽陋聴忙聢路 */
.windows-row {
  display: flex; justify-content: space-around; padding: 0 60px; margin-top: 12px;
}
.window-slot {
  width: 140px; height: 6px; background: #3a4150; border-radius: 3px;
  box-shadow: inset 0 0 8px rgba(74,140,247,0.15);
}

/* ===== 氓聦潞氓聼聼 ===== */
.office-zones {
  display: flex; flex-direction: column; gap: 24px; margin-top: 24px;
}
.row-zones {
  display: flex; gap: 40px; justify-content: center;
}

.zone {
  position: relative;
}
.zone-label {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.zone-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* 猫庐戮忙聳陆氓聦潞 */
.facility-row {
  display: flex; gap: 12px; margin-bottom: 8px;
}
.facility {
  background: var(--floor); border: 1px dashed var(--border); border-radius: 12px;
  padding: 14px 18px; display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text-dim); min-width: 110px;
}
.facility .ficon { font-size: 20px; }

/* 氓路楼盲陆聧莽陆聭忙聽录 */
.seats-grid {
  display: grid; gap: 10px;
}
/* 忙聤聙忙聹炉莽聽聰氓聫聭茅聝篓 2氓聢聴 */
.grid-tech { grid-template-columns: repeat(2, 1fr); }
/* 盲潞搂氓聯聛猫庐戮猫庐隆茅聝篓 3氓聢聴 */
.grid-product { grid-template-columns: repeat(3, 1fr); }
/* 氓赂聜氓聹潞茅聝篓 2氓聢聴 */
.grid-market { grid-template-columns: repeat(2, 1fr); }
/* 猫驴聬猫聬楼莽庐隆莽聬聠茅聝篓 2氓聢聴 */
.grid-ops { grid-template-columns: repeat(2, 1fr); }
/* 猫麓垄氓聤隆茅聝篓 2氓聢聴 */
.grid-finance { grid-template-columns: repeat(2, 1fr); }

/* 氓路楼盲陆聧氓聧隆莽聣聡 */
.seat-card {
  background: var(--floor);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  min-width: 150px;
  display: flex; flex-direction: column; gap: 6px;
}
.seat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  border-color: var(--blue);
  background: var(--surface-hover);
  z-index: 10;
}
.seat-card.empty {
  border-style: dashed; cursor: default; opacity: 0.4;
}
.seat-card.empty:hover {
  transform: none; box-shadow: none; border-color: var(--border);
  background: var(--floor);
}
.seat-card.feishu {
  border-color: var(--green);
  box-shadow: 0 0 0 1px var(--green);
}
.seat-card .seat-header {
  display: flex; align-items: center; justify-content: space-between;
}
.seat-card .seat-num {
  font-size: 10px; color: var(--text-muted); font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.seat-card .seat-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
}
.seat-card .seat-info { flex: 1; }
.seat-card .seat-name {
  font-size: 14px; font-weight: 600; color: var(--text);
  margin-bottom: 2px;
}
.seat-card .seat-dept {
  font-size: 11px; color: var(--text-dim);
}
.seat-card .seat-status {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px;
  display: inline-block; margin-top: 4px;
}
.status-on { background: var(--green-bg); color: var(--green); }
.status-off { background: var(--red-bg); color: var(--red); }
.status-leave { background: var(--orange-bg); color: var(--orange); }
.status-remote { background: var(--purple-bg); color: var(--purple); }

/* 盲赂聧氓聬聦茅聝篓茅聴篓茅垄聹猫聣虏 */
.dept-tech .seat-card:not(.empty):hover { border-color: var(--blue); }
.dept-product .seat-card:not(.empty):hover { border-color: var(--cyan); }
.dept-market .seat-card:not(.empty):hover { border-color: var(--orange); }
.dept-ops .seat-card:not(.empty):hover { border-color: var(--purple); }
.dept-finance .seat-card:not(.empty):hover { border-color: var(--green); }

.seat-card .feishu-dot {
  position: absolute; top: 8px; right: 8px; width: 8px; height: 8px;
  border-radius: 50%; background: var(--green);
  box-shadow: 0 0 8px var(--green);
}

/* 莽漏潞盲陆聧 */
.seat-card.empty .seat-name { color: var(--text-muted); }

/* ===== 氓聸戮盲戮聥 ===== */
.legend-bar {
  display: flex; gap: 20px; flex-wrap: wrap; padding: 14px 24px;
  border-top: 1px solid var(--border); justify-content: center;
  background: var(--surface);
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ===== 氓录鹿莽陋聴 ===== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 28px; width: 420px; max-height: 80vh; overflow-y: auto;
  position: relative; animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal .close-btn {
  position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
  border-radius: 50%; background: var(--border); border: none; color: var(--text);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.modal .close-btn:hover { background: #4a4f5a; }
.modal .m-avatar {
  width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 26px; font-weight: 700; margin-bottom: 12px;
}
.modal h3 { font-size: 20px; margin-bottom: 2px; }
.modal .m-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
.modal .m-status {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 16px;
}
.modal .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.modal .info-item { background: var(--floor); border-radius: 8px; padding: 10px 12px; }
.modal .info-item .info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.modal .info-item .info-value { font-size: 13px; color: var(--text); font-weight: 500; }
.modal .contact-card {
  background: var(--floor); border-radius: 12px; padding: 14px; margin-top: 8px;
  border-left: 3px solid var(--blue);
}
.modal .contact-card .cc-name { font-size: 14px; font-weight: 600; color: var(--blue); }
.modal .contact-card .cc-note { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

/* 氓聯聧氓潞聰氓录聫 */
@media (max-width: 1200px) {
  .office-plan { min-width: auto; padding: 20px; }
  .row-zones { flex-wrap: wrap; gap: 20px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>氓路楼盲陆聹氓庐陇 脗路 氓路楼盲陆聧氓聸戮</h1>
    <span class="badge" id="dataBadge">茅拢聻盲鹿娄氓聬聦忙颅楼</span>

</div>

    <div class="windows-row">

    <div class="facility-row" style="margin-top:16px;justify-content:center;gap:16px;">

      <div class="facility"><span class="ficon">冒聼聳篓茂赂聫</span> 忙聣聯氓聧掳氓聦潞</div>
      <div class="facility"><span class="ficon">冒聼聯娄</span> 氓聜篓莽聣漏茅聴麓</div>

    <!-- 氓聤聻氓聟卢氓聦潞 -->
    <div class="office-zones" id="officeZones"></div>
  </div>
</div>

<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></div> 氓聹篓氓虏聴</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> 莽聴聟氓聛聡/盲潞聥氓聛聡</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> 氓陇聳氓聡潞/氓聡潞氓路庐</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div> 猫驴聹莽篓聥氓聤聻氓聟卢</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--border);border:1px dashed var(--text-muted)"></div> 莽漏潞盲陆聧</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green);box-shadow:0 0 0 2px var(--green)"></div> 茅拢聻盲鹿娄氓聬聦忙颅楼</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modal"></div>
</div>

const deptColors = {
  '忙聤聙忙聹炉莽聽聰氓聫聭茅聝篓': { bg: 'rgba(74,140,247,0.08)', border: 'var(--blue)', class: 'dept-tech', emoji: '冒聼聮禄' },
  '盲潞搂氓聯聛猫庐戮猫庐隆茅聝篓': { bg: 'rgba(46,216,163,0.08)', border: 'var(--cyan)', class: 'dept-product', emoji: '冒聼聨篓' },
  '氓赂聜氓聹潞茅聝篓':     { bg: 'rgba(255,159,67,0.08)', border: 'var(--orange)', class: 'dept-market', emoji: '冒聼聯聤' },
  '猫驴聬猫聬楼莽庐隆莽聬聠茅聝篓': { bg: 'rgba(165,94,234,0.08)', border: 'var(--purple)', class: 'dept-ops', emoji: '芒職聶茂赂聫' },
  '猫麓垄氓聤隆茅聝篓':     { bg: 'rgba(52,199,89,0.08)', border: 'var(--green)', class: 'dept-finance', emoji: '冒聼聮掳' },
};
const gridClasses = {
  '忙聤聙忙聹炉莽聽聰氓聫聭茅聝篓': 'grid-tech', '盲潞搂氓聯聛猫庐戮猫庐隆茅聝篓': 'grid-product',
  '氓赂聜氓聹潞茅聝篓': 'grid-market', '猫驴聬猫聬楼莽庐隆莽聬聠茅聝篓': 'grid-ops', '猫麓垄氓聤隆茅聝篓': 'grid-finance'
};
const statusLabels = { on: '氓聹篓氓虏聴', off: '莽聴聟氓聛聡/盲潞聥氓聛聡', leave: '氓陇聳氓聡潞/氓聡潞氓路庐', remote: '猫驴聹莽篓聥氓聤聻氓聟卢' };
const statusCss = { on: 'status-on', off: 'status-off', leave: 'status-leave', remote: 'status-remote' };
const avatarColors = ['#4a8cf7','#2ed8a3','#ff9f43','#a55eea','#34c759','#ff6b81','#45aaf2','#fed330','#26de81','#fd9644'];

let allUsers = [];
let currentDept = 'all';
let searchTerm = '';

function buildUsers() {
  return __FEISHU_DATA__.users.map((u, i) => ({
    name: u.name,
    dept: u.department || '忙聹陋氓聢聠茅聟聧',
    status: u.status || 'on',
    statusLabel: u.status_label || statusLabels[u.status] || '',
    seatNum: (u.assets || {}).氓路楼盲陆聧氓聫路 || '',
    assets: u.assets || {},
    contact: u.contact || null,
    isFeishu: !!u.is_feishu,
    userId: u.user_id || '',
    avatarColor: avatarColors[i % avatarColors.length],
    initial: u.name.charAt(0)
  }));
}

function init() {
  allUsers = buildUsers();
  document.getElementById('updateTime').textContent = '忙聸麓忙聳掳 ' + __FEISHU_DATA__.update_time;
  document.getElementById('dataBadge').textContent = '茅拢聻盲鹿娄氓聬聦忙颅楼 (' + __FEISHU_DATA__.total + '盲潞潞)';
  buildDeptFilter();
  renderAll();
  updateStats();
}

function buildDeptFilter() {
  const container = document.getElementById('deptFilter');
  container.innerHTML = '<div class="dept-chip all active" onclick="filterDept(\'all\')">氓聟篓茅聝篓 (11盲潞潞)</div>';
  deptOrder.forEach(d => {
    const cnt = allUsers.filter(u => u.dept === d).length;
    const chip = document.createElement('div');
    chip.className = 'dept-chip';
    chip.textContent = d + ' (' + cnt + '盲潞潞)';
    chip.onclick = () => filterDept(d);
    container.appendChild(chip);
  });
}

function filterDept(dept) {
  currentDept = dept;
  document.querySelectorAll('.dept-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.dept-chip').forEach(c => {
    if ((dept === 'all' && c.classList.contains('all')) || c.textContent.startsWith(dept)) {
      c.classList.add('active');
    }
  });
  applyFilters();
}

function applyFilters() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  renderAll();
}

function renderAll() {
  const zones = document.getElementById('officeZones');
  zones.innerHTML = '';

  deptOrder.forEach(deptName => {
    if (currentDept !== 'all' && currentDept !== deptName) return;
    const members = allUsers.filter(u => u.dept === deptName);
    const visible = members.filter(u => {
      if (!searchTerm) return true;
      return u.name.toLowerCase().includes(searchTerm) ||
             u.seatNum.includes(searchTerm) ||
             u.dept.toLowerCase().includes(searchTerm);
    });
    if (visible.length === 0) return;

    const dc = deptColors[deptName];
    const zone = document.createElement('div');
    zone.className = 'zone';
    zone.innerHTML = `
      <div class="zone-label">${dc.emoji} ${deptName}</div>
      <div class="seats-grid ${gridClasses[deptName]}" id="grid-${deptName.replace(/\s/g,'')}"></div>
    `;
    zones.appendChild(zone);

    const grid = zone.querySelector('.seats-grid');
    visible.forEach(u => {
      const card = document.createElement('div');
      let cls = 'seat-card';
      if (u.isFeishu) cls += ' feishu';
      card.className = cls;

      card.innerHTML = `
        ${u.isFeishu ? '<div class="feishu-dot"></div>' : ''}
        <div class="seat-header">
          <span class="seat-num">#${u.seatNum}</span>
          <div class="seat-avatar" style="background:${u.avatarColor}20;color:${u.avatarColor}">${u.initial}</div>
        </div>
        <div class="seat-info">
          <div class="seat-name">${u.name}</div>
          <div class="seat-dept">${u.dept}</div>
          <div class="seat-status ${statusCss[u.status] || ''}">${u.statusLabel}</div>
        </div>
      `;
      card.onclick = () => showDetail(u);
      grid.appendChild(card);
    });

    // 猫隆楼氓聟聟莽漏潞盲陆聧
    const emptySlots = Math.max(0, (currentDept === 'all' ? (deptName === '盲潞搂氓聯聛猫庐戮猫庐隆茅聝篓' ? 3 : 2) : 2) - visible.length);
    for (let i = 0; i < emptySlots; i++) {
      const card = document.createElement('div');
      card.className = 'seat-card empty';
      card.innerHTML = `
        <div class="seat-header">
          <span class="seat-num">莽漏潞盲陆聧</span>
          <div class="seat-avatar" style="background:var(--border);color:var(--text-muted)">芒聙聰</div>
        </div>
        <div class="seat-info">
          <div class="seat-name" style="color:var(--text-muted)">莽漏潞茅聴虏氓路楼盲陆聧</div>
          <div class="seat-dept">${deptName}</div>
          <div class="seat-status" style="background:var(--border);color:var(--text-muted);display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;">氓戮聟氓聢聠茅聟聧</div>
        </div>
      `;
      grid.appendChild(card);
    }
  });

  updateStats();
}

function updateStats() {
  let on = 0, off = 0, leave = 0, remote = 0;
  allUsers.forEach(u => {
    if (u.status === 'on') on++;
    else if (u.status === 'off') off++;
    else if (u.status === 'leave') leave++;
    else if (u.status === 'remote') remote++;
  });
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill"><span class="dot on"></span>氓聹篓氓虏聴 ${on}</div>
    <div class="stat-pill"><span class="dot off"></span>盲录聭氓聛聡 ${off}</div>
    <div class="stat-pill"><span class="dot leave"></span>氓陇聳氓聡潞 ${leave}</div>
    <div class="stat-pill"><span class="dot remote"></span>猫驴聹莽篓聥 ${remote}</div>
  `;
}

function showDetail(u) {
  const m = document.getElementById('modal');
  let assetsHtml = '';
  const assets = u.assets || {};
  const keys = Object.keys(assets).filter(k => k !== '忙聸驴猫隆楼猫聛聰莽鲁禄盲潞潞' && k !== '猫碌聞盲潞搂');
  keys.forEach(k => {
    assetsHtml += `<div class="info-item"><div class="info-label">${k}</div><div class="info-value">${assets[k]}</div></div>`;
  });
  const assetList = assets['猫碌聞盲潞搂'];
  if (assetList && Array.isArray(assetList)) {
    assetsHtml += `<div class="info-item"><div class="info-label">茅聟聧氓陇聡猫碌聞盲潞搂</div><div class="info-value">${assetList.join('茫聙聛')}</div></div>`;
  }

  let contactHtml = '';
  if (u.contact) {
    contactHtml = `
      <div class="contact-card">
        <div class="cc-name">${u.contact.name} 脗路 ${u.contact.role || ''}</div>
        <div class="cc-note">${u.contact.note || ''}</div>
      </div>
    `;
  }

  const sc = statusCss[u.status] || '';
  m.innerHTML = `
    <button class="close-btn" onclick="closeModal()">芒聹聲</button>
    <div class="m-avatar" style="background:${u.avatarColor}20;color:${u.avatarColor}">${u.initial}</div>
    <h3>${u.name}</h3>
    <div class="m-sub">${u.dept} 脗路 ${u.seatNum}${u.isFeishu ? ' 脗路 茅拢聻盲鹿娄氓聬聦忙颅楼' : ''}${u.userId ? ' 脗路 ID:' + u.userId : ''}</div>
    <div class="m-status ${sc}">${u.statusLabel}</div>
    <div class="info-grid">${assetsHtml}</div>
    ${u.status !== 'on' && u.contact ? contactHtml : ''}
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
init();
</script>
